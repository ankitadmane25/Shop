<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Aesthetix</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-wrapper">
      <a href="index.html" class="logo">
        <div class="logo-icon">A</div>
        <div class="logo-text">aesthetix<span>.</span></div>
      </a>
      <nav>
        <ul>
          <li><a href="index.html">Shop</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-trigger" aria-label="View Shopping Cart">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span class="cart-count">0</span>
        </a>
        <div id="header-auth-wrapper">
          <!-- Auth details injected by main.js -->
        </div>
      </div>
    </div>
  </header>

  <!-- Product Detail Container -->
  <main class="container">
    <div style="margin-top: 30px;">
      <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); transition: var(--transition-smooth); font-weight: 500;" onmouseover="this.style.color='var(--pastel-blue)'" onmouseout="this.style.color='var(--text-secondary)'">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Catalog
      </a>
    </div>

    <div class="detail-layout" id="product-detail-container">
      <div class="empty-state" style="grid-column: 1 / -1;">
        <p>Loading product details...</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 <span>aesthetix.</span> All rights reserved. Designed with premium pastel accents.</p>
    </div>
  </footer>

  <div id="toast-container"></div>

  <script src="js/main.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
