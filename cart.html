<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Aesthetix</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-wrapper">
      <a href="index.html" class="logo">
        <div class="logo-icon">A</div>
        <div class="logo-text">aesthetix<span>.</span></div>
      </a>
      <nav>
        <ul>
          <li><a href="index.html">Shop</a></li>
          <li><a href="cart.html" class="active">Cart</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="cart-trigger" aria-label="View Shopping Cart">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span class="cart-count">0</span>
        </a>
        <div id="header-auth-wrapper">
          <!-- Auth details injected by main.js -->
        </div>
      </div>
    </div>
  </header>

  <!-- Cart Page Layout -->
  <main class="container cart-layout" id="cart-content-wrapper">
    
    <!-- Left: Cart Items List -->
    <div class="cart-items-wrapper">
      <h2 class="cart-title">Shopping Cart</h2>
      <div id="cart-items-list" class="cart-list">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Right: Summary & Checkout Forms -->
    <div class="checkout-panel">
      
      <!-- Order Summary -->
      <div class="summary-box">
        <h3 class="cart-title" style="font-size: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 20px;">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="summary-shipping">FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">$0.00</span>
        </div>
      </div>

      <!-- Shipping Address Form -->
      <div class="checkout-form-box" id="checkout-form-container">
        <h3 class="cart-title" style="font-size: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 20px;">Shipping Details</h3>
        
        <div id="checkout-auth-warning" style="display: none; margin-bottom: 20px;">
          <p style="color: var(--pastel-yellow); font-size: 14px; font-weight: 500; background: rgba(254, 240, 138, 0.08); border: 1px solid rgba(254, 240, 138, 0.2); padding: 12px; border-radius: var(--radius-md);">
            You must be signed in to complete checkout. 
            <a href="login.html?redirect=cart.html" style="text-decoration: underline; color: var(--pastel-blue); font-weight: 600;">Sign In Here</a>
          </p>
        </div>

        <form id="checkout-form">
          <div class="form-group">
            <label for="shipping-name">Full Name</label>
            <input type="text" id="shipping-name" placeholder="John Doe" required disabled>
          </div>
          <div class="form-group">
            <label for="shipping-address">Delivery Address</label>
            <textarea id="shipping-address" placeholder="123 Pastel St, Cozy Town, CA 90210" required disabled></textarea>
          </div>
          
          <button type="submit" class="btn-checkout" id="btn-checkout-submit" disabled>
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            Complete Purchase
          </button>
        </form>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 <span>aesthetix.</span> All rights reserved. Designed with premium pastel accents.</p>
    </div>
  </footer>

  <div id="toast-container"></div>

  <script src="js/main.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
